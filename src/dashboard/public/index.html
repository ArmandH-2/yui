<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yui Dashboard</title>
    <meta name="description" content="Yui — Minecraft Staff Management Dashboard">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">幽</span>
                <span class="logo-text">Yui</span>
            </div>
        </div>
        <nav class="nav">
            <a href="#overview" class="nav-item active" data-page="overview">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Overview</span>
            </a>
            <a href="#tracker" class="nav-item" data-page="tracker">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>Staff Tracker</span>
            </a>
            <a href="#profiles" class="nav-item" data-page="profiles">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span>Player Profiles</span>
            </a>
            <a href="#audit" class="nav-item" data-page="audit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                <span>Audit & Feedback</span>
            </a>
            <a href="#reminders" class="nav-item" data-page="reminders">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>Reminders</span>
            </a>
            <a href="#brain" class="nav-item" data-page="brain">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2a9 9 0 0 1 9 9c0 3.9-3.1 7.1-7 7.9V22h-4v-3.1C6.1 18.1 3 14.9 3 11a9 9 0 0 1 9-9z">
                    </path>
                    <line x1="12" y1="6" x2="12" y2="10"></line>
                    <line x1="10" y1="8" x2="14" y2="8"></line>
                </svg>
                <span>Memory & Skills</span>
            </a>
            <a href="#console" class="nav-item" data-page="console">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="4 17 10 11 4 5"></polyline>
                    <line x1="12" y1="19" x2="20" y2="19"></line>
                </svg>
                <span>Console</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="mode-toggle" id="mode-toggle">
                <span class="mode-toggle-label" id="mode-label">🔒 Private</span>
                <div class="toggle-switch active" id="mode-switch" title="Toggle Private/Public mode"></div>
            </div>
            <div class="sidebar-footer-row">
                <div class="connection-dots">
                    <span class="dot" id="mc-dot" title="Minecraft"></span>
                    <span class="dot-label">MC</span>
                    <span class="dot" id="dc-dot" title="Discord"></span>
                    <span class="dot-label">DC</span>
                </div>
                <span class="sidebar-uptime" id="sidebar-uptime">--</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
        <div class="page-content" id="page-content">
            <!-- Pages are loaded here dynamically -->
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toasts"></div>

    <script src="/js/api.js"></script>
    <script src="/js/pages/overview.js"></script>
    <script src="/js/pages/tracker.js"></script>
    <script src="/js/pages/profiles.js"></script>
    <script src="/js/pages/audit.js"></script>
    <script src="/js/pages/reminders.js"></script>
    <script src="/js/pages/brain.js"></script>
    <script src="/js/pages/console.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
